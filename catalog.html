<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — ClassicGuitarShop</title>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container header__vnutri">
            <a href="index.html" class="header__logo">ClassicGuitarShop</a>
            <nav class="header__nav" id="mainNav">
                <a href="index.html" class="header__link">Главная</a>
                <a href="catalog.html" class="header__link header__link--active">Каталог</a>
                <a href="about.html" class="header__link">О нас</a>
                <a href="contacts.html" class="header__link">Контакты</a>
                <button class="header__link header__search" aria-label="Поиск">🔍 <span>Поиск</span></button>
                <a href="cart.html" class="header__link header__cart">🛒 <span>Корзина</span></a>
            </nav>
            <div class="header__actions">
                <button class="header__search" aria-label="Поиск">🔍 <span>Поиск</span></button>
                <a href="cart.html" class="header__cart">🛒 <span>Корзина</span></a>
                <button class="header__burger" id="burgerBtn" aria-label="Меню" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        
        <section class="catalog-hero">
            <div class="container">
                <h1 class="catalog-hero__title">Классические гитары</h1>
                <nav class="breadcrumb" aria-label="Хлебные крошки">
                    <a href="index.html">Главная</a> / <span>Каталог</span>
                </nav>
            </div>
        </section>

        
        <section class="catalog">
            <div class="container">
                <div class="catalog__grid">
                    <button class="filters__toggle" id="filtersToggle">Фильтры</button>
                    
                    <aside class="filters" id="filtersSidebar">
                        <div class="filters__vnutri">
                            <div class="filters__header">
                                <h3 class="filters__title">Фильтры</h3>
                                <button class="filters__close" id="filtersClose" aria-label="Закрыть фильтры">✕</button>
                            </div>
                            
                            <div class="filter-group">
                                <label class="filter__label">Цена, ₽</label>
                                <div class="filter__price-inputs">
                                    <input type="number" class="filter__input" placeholder="от" min="0">
                                    <input type="number" class="filter__input" placeholder="до" min="0">
                                </div>
                            </div>

                            <div class="filter-group">
                                <label class="filter__label">Размер</label>
                                <div class="filter__options">
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="size" value="1/2"> <span>1/2</span>
                                    </label>
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="size" value="3/4"> <span>3/4</span>
                                    </label>
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="size" value="4/4"> <span>4/4</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filter-group">
                                <label class="filter__label">Бренд</label>
                                <div class="filter__options">
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="brand" value="Alhambra"> <span>Alhambra</span>
                                    </label>
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="brand" value="Prudencio Saez"> <span>Prudencio Saez</span>
                                    </label>
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="brand" value="Manuel Rodriguez"> <span>Manuel Rodriguez</span>
                                    </label>
                                    <label class="filter__checkbox">
                                        <input type="checkbox" name="brand" value="Cort"> <span>Cort</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filters__actions">
                                <button class="btn btn--accent btn--full">Применить</button>
                                <button class="btn btn--ghost btn--full">Сбросить</button>
                            </div>
                        </div>
                    </aside>

                    
                    <div class="catalog__products">
                        <div class="catalog__toolbar">
                            <p class="catalog__count">Сортировать 20 товаров</p>
                            <div class="catalog__sort">
                                <span>по:</span>
                                <select class="catalog__select">
                                    <option value="popular" selected>популярное</option>
                                    <option value="price-asc">цене ↑</option>
                                    <option value="price-desc">цене ↓</option>
                                    <option value="new">новизне</option>
                                </select>
                            </div>
                        </div>

                        <div class="products-grid" id="catalogProducts">
                        </div>


                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__grid">
            <div class="footer__col">
                <p class="footer__logo">ClassicGuitarShop</p>
                <p class="footer__copyright">© 2026 Все права защищены</p>
            </div>
            <div class="footer__col">
                <h4 class="footer__title">Мы в соцсетях</h4>
                <p class="footer__social">VK | Telegram | YouTube</p>
            </div>
            <div class="footer__col">
                <a href="contacts.html" class="header__link"><h4 class="footer__title">Контакты</h4></a>
                <p class="footer__phone">+7 (993) 980-16-76</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
