<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — ClassicGuitarShop</title>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container header_vnutri">
            <a href="index.html" class="header_logo">ClassicGuitarShop</a>
            <nav class="header_nav" id="mainNav">
                <a href="index.html" class="header_link">Главная</a>
                <a href="catalog.html" class="header_link header_link-active">Каталог</a>
                <a href="about.html" class="header_link">О нас</a>
                <a href="contacts.html" class="header_link">Контакты</a>
                <button class="header_link header_search" aria-label="Поиск">🔍 <span>Поиск</span></button>
                <a href="cart.html" class="header_link header_cart">🛒 <span>Корзина</span></a>
            </nav>
            <div class="header_actions">
                <button class="header_search" aria-label="Поиск">🔍 <span>Поиск</span></button>
                <a href="cart.html" class="header_cart">🛒 <span>Корзина</span></a>
                <button class="header_burger" id="burgerBtn" aria-label="Меню" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        
        <section class="catalog-hero">
            <div class="container">
                <h1 class="catalog-hero_title">Классические гитары</h1>
                <nav class="breadcrumb" aria-label="Хлебные крошки">
                    <a href="index.html">Главная</a> / <span>Каталог</span>
                </nav>
            </div>
        </section>

        
        <section class="catalog">
            <div class="container">
                <div class="catalog_grid">
                    <button class="filters_toggle" id="filtersToggle">Фильтры</button>
                    
                    <aside class="filters" id="filtersSidebar">
                        <div class="filters_vnutri">
                            <div class="filters_header">
                                <h3 class="filters_title">Фильтры</h3>
                                <button class="filters_close" id="filtersClose" aria-label="Закрыть фильтры">✕</button>
                            </div>
                            
                            <div class="filter-group">
                                <label class="filter_label">Цена, ₽</label>
                                <div class="filter_price-inputs">
                                    <input type="number" class="filter_input" placeholder="от" min="0">
                                    <input type="number" class="filter_input" placeholder="до" min="0">
                                </div>
                            </div>

                            <div class="filter-group">
                                <label class="filter_label">Размер</label>
                                <div class="filter_options">
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="size" value="1/2"> <span>1/2</span>
                                    </label>
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="size" value="3/4"> <span>3/4</span>
                                    </label>
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="size" value="4/4"> <span>4/4</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filter-group">
                                <label class="filter_label">Бренд</label>
                                <div class="filter_options">
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="brand" value="Alhambra"> <span>Alhambra</span>
                                    </label>
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="brand" value="Prudencio Saez"> <span>Prudencio Saez</span>
                                    </label>
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="brand" value="Manuel Rodriguez"> <span>Manuel Rodriguez</span>
                                    </label>
                                    <label class="filter_checkbox">
                                        <input type="checkbox" name="brand" value="Cort"> <span>Cort</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filters_actions">
                                <button class="btn btn-accent btn-full">Применить</button>
                                <button class="btn btn-ghost btn-full">Сбросить</button>
                            </div>
                        </div>
                    </aside>

                    
                    <div class="catalog_products">
                        <div class="catalog_toolbar">
                            <p class="catalog_count">Сортировать 20 товаров</p>
                            <div class="catalog_sort">
                                <span>по:</span>
                                <select class="catalog_select">
                                    <option value="popular" selected>популярное</option>
                                    <option value="price-asc">цене ↑</option>
                                    <option value="price-desc">цене ↓</option>
                                    <option value="new">новизне</option>
                                </select>
                            </div>
                        </div>

                        <div class="products-grid" id="catalogProducts">
                        </div>


                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer_grid">
            <div class="footer_col">
                <p class="footer_logo">ClassicGuitarShop</p>
                <p class="footer_copyright">© 2026 Все права защищены</p>
            </div>
            <div class="footer_col">
                <h4 class="footer_title">Мы в соцсетях</h4>
                <p class="footer_social">VK | Telegram | YouTube</p>
            </div>
            <div class="footer_col">
                <a href="contacts.html" class="header_link"><h4 class="footer_title">Контакты</h4></a>
                <p class="footer_phone">+7 (993) 980-16-76</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
